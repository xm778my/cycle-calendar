      min-height: 100vh;
      color: #1f2937;
    }
    body.dark {
      background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
      color: #f9fafb;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .header p { font-size: 14px; color: #6b7280; }
    body.dark .header p { color: #9ca3af; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1);
      margin-bottom: 16px;
    }
    body.dark .toolbar { background: #1f2937; }
    .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      color: #1f2937;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    body.dark .btn { background: #1f2937; border-color: #374151; color: #f9fafb; }
    .btn:hover { background: #f9fafb; }
    body.dark .btn:hover { background: #374151; }
    .btn-primary { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    body.dark .btn-primary { background: #3b82f6; border-color: #3b82f6; }
    .btn-icon { padding: 8px; min-width: 36px; }
    .search-box {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      gap: 8px;
    }
    body.dark .search-box { background: #1f2937; border-color: #374151; }
    .search-box input {
      border: none; outline: none; background: transparent;
      font-size: 14px; color: #1f2937; width: 180px;
    }
    body.dark .search-box input { color: #f9fafb; }
    .search-box input::placeholder { color: #9ca3af; }
    .calendar {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1);
      overflow: hidden;
    }
    body.dark .calendar { background: #1f2937; }
    .calendar-header {
      display: grid;
      grid-template-columns: 72px repeat(7, 1fr);
      background: #f9fafb;
    }
    body.dark .calendar-header { background: #374151; }
    .calendar-header-cell {
      padding: 12px 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #6b7280;
      border-bottom: 1px solid #e5e7eb;
    }
    body.dark .calendar-header-cell { border-bottom-color: #374151; color: #9ca3af; }
    .calendar-header-cell.weekend { color: #ef4444; }
    .calendar-body {
      display: grid;
      grid-template-columns: 72px repeat(7, 1fr);
    }
    .cycle-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
      border-right: 1px solid #e5e7eb;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    body.dark .cycle-cell { background: #1f2937; border-color: #374151; }
    body.dark .cycle-cell.outside { background: #374151; }
    .cycle-cell.outside { background: #f9fafb; cursor: default; }
    .cycle-cell.highlighted { background: #fef3c7; }
    body.dark .cycle-cell.highlighted { background: rgba(245, 158, 11, 0.2); }
    .cycle-tag {
      display: inline-block;
      padding: 4px 8px;
      background: #3b82f6;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      border-radius: 9999px;
      transition: all 0.2s ease;
    }
    .cycle-tag.highlighted { background: #f59e0b; transform: scale(1.1); }
    .date-cell {
      position: relative;
      min-height: 80px;
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
      border-right: 1px solid #e5e7eb;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    body.dark .date-cell { background: #1f2937; border-color: #374151; }
    body.dark .date-cell.outside { background: #374151; }
    .date-cell.outside { background: #f9fafb; cursor: default; }
    .date-cell.highlighted { background: #fef3c7; }
    body.dark .date-cell.highlighted { background: rgba(245, 158, 11, 0.2); }
    .date-cell.today { box-shadow: inset 0 0 0 2px #3b82f6; z-index: 1; }
    .date-cell.selected { background: rgba(59, 130, 246, 0.1); }
    .date-cell:hover { background: rgba(59, 130, 246, 0.05); }
    .date-num { font-size: 16px; font-weight: 600; color: #1f2937; }
    body.dark .date-num { color: #f9fafb; }
    .date-cell.outside .date-num { color: #d1d5db; }
    .date-cell.weekend .date-num { color: #ef4444; }
    .date-info { margin-top: 4px; font-size: 12px; color: #6b7280; }
    body.dark .date-info { color: #9ca3af; }
    .date-info.festival { color: #ef4444; }
    .date-info.holiday {
      display: inline-block;
      padding: 1px 6px;
      background: #f3f4f6;
      border-radius: 4px;
      font-size: 11px;
      color: #6b7280;
    }
    body.dark .date-info.holiday { background: #374151; color: #9ca3af; }
    .date-info.workday {
      display: inline-block;
      padding: 1px 6px;
      background: #fef3c7;
      border-radius: 4px;
      font-size: 11px;
      color: #d97706;
      font-weight: 500;
    }
    body.dark .date-info.workday { background: rgba(245, 158, 11, 0.2); }
    .legend {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1);
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
    }

    .legend-items { display: flex; flex-wrap: wrap; gap: 16px; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-tag { padding: 2px 8px; font-size: 11px; font-weight: 600; border-radius: 9999px; }
    .legend-tag.blue { background: #3b82f6; color: #fff; }
    .legend-tag.gray { background: #f3f4f6; color: #6b7280; }

    .legend-tag.orange { background: #fef3c7; color: #d97706; }
    body.dark .legend-tag.orange { background: rgba(245, 158, 11, 0.2); }
    .legend-tag.border {

      border: 2px solid #3b82f6;
      border-radius: 4px;
      background: transparent;
    }
    .tooltip {
      position: fixed;
      display: none;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      z-index: 1000;
      font-size: 13px;
      max-width: 220px;
    }

    .tooltip.show { display: block; }
    .tooltip-title { font-weight: 600; margin-bottom: 8px; color: #1f2937; }

    .tooltip-row { margin-bottom: 4px; color: #6b7280; }

    .tooltip-row strong { color: #1f2937; }
    body.dark .tooltip-row strong { color: #f9fafb; }
    .shortcuts {

      margin-top: 16px;
      font-size: 12px;
      color: #6b7280;
    }
    .error-msg {

      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #dc2626;
      font-size: 14px;
      z-index: 1000;

      .date-num { font-size: 14px; }
      .date-info { font-size: 10px; }
      .cycle-tag { font-size: 10px; padding: 2px 6px; }
      .shortcuts { display: none; }
    }

      '2030-10-06': { name: '国庆节', holiday: true },
      '2030-10-07': { name: '国庆节', holiday: true }
    };

    var SOLAR_FESTIVALS = {
      '01-01': '元旦', '02-14': '情人节', '03-08': '妇女节', '03-12': '植树节',
      '04-01': '愚人节', '05-01': '劳动节', '05-04': '青年节', '06-01': '儿童节',
      '07-01': '建党节', '08-01': '建军节', '09-10': '教师节', '10-01': '国庆节',
      '12-24': '平安夜', '12-25': '圣诞节'
    };

    // ========== 工具函数 ==========
    function pad2(n) {
      return n < 10 ? '0' + n : '' + n;
    }

    // ========== 农历转换 ==========
    function lYearDays(y) {
      var sum = 348;
      for (var i = 0x8000; i > 0x8; i >>= 1) {
        sum += (LUNAR_INFO[y - 1900] & i) ? 1 : 0;
      }
      return sum + leapDays(y);
    }

    function leapMonth(y) {
      return LUNAR_INFO[y - 1900] & 0xf;
    }

    function leapDays(y) {
      if (leapMonth(y)) {
        return (LUNAR_INFO[y - 1900] & 0x10000) ? 30 : 29;
      }
      return 0;
    }

    function monthDays(y, m) {
      return (LUNAR_INFO[y - 1900] & (0x10000 >> m)) ? 30 : 29;
    }

    function solarToLunar(year, month, day) {
      var baseDate = new Date(1900, 0, 31);
      var objDate = new Date(year, month - 1, day);
      var offset = Math.floor((objDate.getTime() - baseDate.getTime()) / 86400000);

      var i = 1900;
      var temp = 0;
      for (; i < 2100 && offset > 0; i++) {
        temp = lYearDays(i);
        offset -= temp;
      }
      if (offset < 0) {
        offset += temp;
        i--;
      }

      var lunarYear = i;
      var leap = leapMonth(i);
      var isLeap = false;
      var lunarMonth = 1;

      for (; lunarMonth < 13 && offset > 0; lunarMonth++) {
        if (leap > 0 && lunarMonth === leap + 1 && !isLeap) {
          --lunarMonth;
          isLeap = true;
          temp = leapDays(lunarYear);
        } else {
          temp = monthDays(lunarYear, lunarMonth);
        }
        if (isLeap && lunarMonth === leap + 1) isLeap = false;
        offset -= temp;
      }

      if (offset === 0 && leap > 0 && lunarMonth === leap + 1) {
        if (isLeap) {
          isLeap = false;
        } else {
          isLeap = true;
          --lunarMonth;
        }
      }

      if (offset < 0) {
        offset += temp;
        --lunarMonth;
      }

      var lunarDay = offset + 1;

      var monthCn = (isLeap ? '闰' : '') + LUNAR_MONTHS[lunarMonth - 1] + '月';

      var dayCn = '';
      if (lunarDay === 10) dayCn = '初十';
      else if (lunarDay === 20) dayCn = '二十';
      else if (lunarDay === 30) dayCn = '三十';
      else {
        var d1 = LUNAR_CHARS[Math.floor(lunarDay / 10)];
        var d2 = LUNAR_CHARS[lunarDay % 10];
        dayCn = (lunarDay < 10 ? '初' : '') + (lunarDay < 20 ? d2 : d1 + d2);
      }

      return { monthCn: monthCn, dayCn: dayCn, lunarDay: lunarDay };
    }

    function sTermInfo(y, n) {
      var off = SOLAR_TERM[n];
      return new Date(31556925974.7 * (y - 1900) + off * 60000 + Date.UTC(1900, 0, 6, 2, 5)).getUTCDate();
    }

    function getSolarTerm(year, month, day) {
      var m = month;
      var day1 = sTermInfo(year, m * 2);
      var day2 = sTermInfo(year, m * 2 + 1);
      if (day === day1) return SOLAR_TERM_NAMES[m * 2];
      if (day === day2) return SOLAR_TERM_NAMES[m * 2 + 1];
      return null;
    }

    // ========== 周期计算 ==========
    function getCycleNumber(date) {
      var year = date.getFullYear();
      var yearStart = new Date(year, 0, 1);
      var yearStartDay = yearStart.getDay();
      var dayDiff = Math.floor((date.getTime() - yearStart.getTime()) / 86400000);

      var weekNumber;
      if (dayDiff < (7 - yearStartDay)) {
        weekNumber = 1;
      } else {
        var remainingDays = dayDiff - (7 - yearStartDay);
        weekNumber = 2 + Math.floor(remainingDays / 7);
      }

      var y2 = year % 100;
      return (y2 < 10 ? '0' : '') + y2 + (weekNumber < 10 ? '0' : '') + weekNumber;
    }

    function getCycleDateRange(cycleNumber) {
      if (!/^\d{4}$/.test(cycleNumber)) return null;
      var yearSuffix = cycleNumber.slice(0, 2);
      var weekNum = parseInt(cycleNumber.slice(2, 4), 10);
      var year = 2000 + parseInt(yearSuffix, 10);

      if (year < 2026 || year > 2030) return null;

      var yearStart = new Date(year, 0, 1);
      var yearStartDay = yearStart.getDay();

      var startDate;
      if (weekNum === 1) {
        startDate = new Date(yearStart);
      } else {
        var firstSundayOffset = (7 - yearStartDay) % 7;
        var weekOffset = firstSundayOffset + (weekNum - 2) * 7;
        startDate = new Date(year, 0, 1 + weekOffset);
      }

      var endDate = new Date(startDate);
      endDate.setDate(startDate.getDate() + 6);

      return { start: startDate, end: endDate };
    }

    // ========== 状态 ==========
    var state = {
      year: new Date().getFullYear(),
      month: new Date().getMonth(),
      selectedDate: null,
      highlightedCycle: null,
      darkMode: localStorage.getItem('cycle-calendar-dark-mode') === 'true'
    };

    // ========== DOM ==========
    var yearBtn = document.getElementById('yearBtn');
    var monthBtn = document.getElementById('monthBtn');
    var calendarBody = document.getElementById('calendarBody');
    var searchInput = document.getElementById('searchInput');
    var darkModeBtn = document.getElementById('darkModeBtn');
    var tooltip = document.getElementById('tooltip');

    // ========== 渲染 ==========
    function render() {
      yearBtn.textContent = state.year + '年';
      monthBtn.textContent = MONTHS[state.month];
      darkModeBtn.textContent = state.darkMode ? '\u2600\uFE0F' : '\uD83C\uDF19';

      if (state.darkMode) {
        document.body.className = 'dark';
      } else {
        document.body.className = '';
      }

      var today = new Date();
      today.setHours(0, 0, 0, 0);

      var firstDay = new Date(state.year, state.month, 1);
      var firstDayOfWeek = firstDay.getDay();

      var startDate = new Date(firstDay);
      startDate.setDate(firstDay.getDate() - firstDayOfWeek);

      var html = '';
      for (var week = 0; week < 6; week++) {
        var weekStart = new Date(startDate);
        weekStart.setDate(startDate.getDate() + week * 7);

        var cycleNum = getCycleNumber(weekStart);
        var isHighlightedWeek = state.highlightedCycle === cycleNum;
        var isCurrentMonthWeek = weekStart.getMonth() === state.month;

        var cycleClass = '';
        if (!isCurrentMonthWeek) cycleClass = 'outside';
        else if (isHighlightedWeek) cycleClass = 'highlighted';

        var tagClass = isHighlightedWeek ? 'highlighted' : '';

        html += '<div class="cycle-cell ' + cycleClass + '" data-cycle="' + cycleNum + '" data-current="' + isCurrentMonthWeek + '">';
        if (isCurrentMonthWeek) {
          html += '<span class="cycle-tag ' + tagClass + '">' + cycleNum + '</span>';
        }
        html += '</div>';

        for (var day = 0; day < 7; day++) {
          var current = new Date(weekStart);
          current.setDate(weekStart.getDate() + day);

          var isCurrentMonth = current.getMonth() === state.month;
          var isToday = current.getTime() === today.getTime();
          var isWeekend = current.getDay() === 0 || current.getDay() === 6;
          var isSelected = state.selectedDate && current.getTime() === state.selectedDate.getTime();

          var lunar = solarToLunar(current.getFullYear(), current.getMonth() + 1, current.getDate());
          var solarTerm = getSolarTerm(current.getFullYear(), current.getMonth(), current.getDate());
          var dateKey = current.getFullYear() + '-' + pad2(current.getMonth() + 1) + '-' + pad2(current.getDate());
          var holiday = HOLIDAYS[dateKey];
          var festivalKey = pad2(current.getMonth() + 1) + '-' + pad2(current.getDate());
          var solarFestival = SOLAR_FESTIVALS[festivalKey];

          var holidayName = holiday ? holiday.name : '';
          var displayText = holidayName || solarTerm || solarFestival || lunar.dayCn;
          var isFestival = !!holiday || !!solarTerm || !!solarFestival;

          var infoClass = 'date-info';
          var tagHtml = '';
          if (holiday && holiday.workday) {
            infoClass += ' workday';
          } else if (holiday && holiday.holiday) {
            infoClass += ' holiday';
          }
          if (holiday && holiday.holiday && !holiday.workday) {
            tagHtml = '<span class="' + infoClass + '">休</span>';
          } else if (holiday && holiday.workday) {
            tagHtml = '<span class="' + infoClass + '">班</span>';
          }

          var cellClass = 'date-cell';
          if (!isCurrentMonth) cellClass += ' outside';
          if (isToday) cellClass += ' today';
          if (isWeekend) cellClass += ' weekend';
          if (isSelected) cellClass += ' selected';
          if (isHighlightedWeek && isCurrentMonth) cellClass += ' highlighted';

          var cycleInfo = getCycleDateRange(cycleNum);
          var cycleStart = cycleInfo ? (cycleInfo.start.getMonth() + 1) + '月' + cycleInfo.start.getDate() + '日' : '';
          var cycleEnd = cycleInfo ? (cycleInfo.end.getMonth() + 1) + '月' + cycleInfo.end.getDate() + '日' : '';

          html += '<div class="' + cellClass + '" data-date="' + dateKey + '" data-cycle="' + cycleNum + '" data-lunar="' + lunar.monthCn + lunar.dayCn + '" data-solarterm="' + (solarTerm || '') + '" data-holiday="' + holidayName + '" data-cyclestart="' + cycleStart + '" data-cycleend="' + cycleEnd + '">';
          html += '<span class="date-num">' + current.getDate() + '</span>';
          html += tagHtml;
          html += '<div class="' + (isFestival ? 'date-info festival' : 'date-info') + '">' + displayText + '</div>';
          html += '</div>';
        }
      }

      calendarBody.innerHTML = html;
    }

    // ========== 事件 ==========
    document.getElementById('prevYear').onclick = function() {
      if (state.year > 2026) {
        state.year--;
        state.selectedDate = null;
        state.highlightedCycle = null;
        render();
      }
    };

    document.getElementById('nextYear').onclick = function() {
      if (state.year < 2030) {
        state.year++;
        state.selectedDate = null;
        state.highlightedCycle = null;
        render();
      }
    };

    document.getElementById('prevMonth').onclick = function() {
      state.month--;
      if (state.month < 0) {
        state.month = 11;
        state.year--;
      }
      if (state.year < 2026) {
        state.year = 2026;
        state.month = 0;
      }
      state.selectedDate = null;
      state.highlightedCycle = null;
      render();
    };

    document.getElementById('nextMonth').onclick = function() {
      state.month++;
      if (state.month > 11) {
        state.month = 0;
        state.year++;
      }
      if (state.year > 2030) {
        state.year = 2030;
        state.month = 11;
      }
      state.selectedDate = null;
      state.highlightedCycle = null;
      render();
    };

    document.getElementById('todayBtn').onclick = function() {
      var today = new Date();
      state.year = today.getFullYear();
      state.month = today.getMonth();
      state.selectedDate = today;
      state.highlightedCycle = null;
      render();
    };

    darkModeBtn.onclick = function() {
      state.darkMode = !state.darkMode;
      localStorage.setItem('cycle-calendar-dark-mode', state.darkMode);
      render();
    };

    // 搜索
    searchInput.onkeydown = function(e) {
      if (e.key === 'Enter') {
        var value = searchInput.value.trim();
        if (/^\d{4}$/.test(value)) {
          var range = getCycleDateRange(value);
          if (!range) {
            showError('周期号超出支持范围（2026-2030年）');
            return;
          }
          state.year = range.start.getFullYear();
          state.month = range.start.getMonth();
          state.highlightedCycle = value;
          state.selectedDate = null;
        } else if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
          var parts = value.split('-');
          var y = parseInt(parts[0], 10);
          var m = parseInt(parts[1], 10);
          var d = parseInt(parts[2], 10);
          var date = new Date(y, m - 1, d);
          if (date.getFullYear() < 2026 || date.getFullYear() > 2030) {
            showError('日期超出支持范围（2026-2030年）');
            return;
          }
          state.year = y;
          state.month = m - 1;
          state.selectedDate = date;
          state.highlightedCycle = null;
        } else {
          showError('请输入正确格式：周期号（2605）或日期（2026-06-09）');
          return;
        }
        render();
        searchInput.blur();
      }
    };

    // 点击周期号高亮
    calendarBody.onclick = function(e) {
      var cycleCell = null;
      var target = e.target;
      while (target && target !== calendarBody) {
        if (target.className && target.className.indexOf('cycle-cell') >= 0) {
          cycleCell = target;
          break;
        }
        target = target.parentNode;
      }
      if (cycleCell && cycleCell.getAttribute('data-current') === 'true') {
        var cycle = cycleCell.getAttribute('data-cycle');
        state.highlightedCycle = state.highlightedCycle === cycle ? null : cycle;
        state.selectedDate = null;
        render();
        return;
      }

      var dateCell = null;
      target = e.target;
      while (target && target !== calendarBody) {
        if (target.className && target.className.indexOf('date-cell') >= 0) {
          dateCell = target;
          break;
        }
        target = target.parentNode;
      }
      if (dateCell && dateCell.className.indexOf('outside') < 0) {
        var dateStr = dateCell.getAttribute('data-date');
        var dateParts = dateStr.split('-');
        state.selectedDate = new Date(parseInt(dateParts[0], 10), parseInt(dateParts[1], 10) - 1, parseInt(dateParts[2], 10));
        state.highlightedCycle = null;
        render();
      }
    };

    // Tooltip
    var tooltipTimeout;
    calendarBody.onmouseover = function(e) {
      var cell = null;
      var target = e.target;
      while (target && target !== calendarBody) {
        if (target.className && target.className.indexOf('date-cell') >= 0) {
          cell = target;
          break;
        }
        target = target.parentNode;
      }
      if (!cell || cell.className.indexOf('outside') >= 0) return;

      clearTimeout(tooltipTimeout);
      tooltipTimeout = setTimeout(function() {
        var dateParts = cell.getAttribute('data-date').split('-');
        var y = parseInt(dateParts[0], 10);
        var m = parseInt(dateParts[1], 10);
        var d = parseInt(dateParts[2], 10);
        document.getElementById('tooltipTitle').textContent = y + '年' + m + '月' + d + '日';
        document.getElementById('tooltipLunar').innerHTML = '农历：<strong>' + cell.getAttribute('data-lunar') + '</strong>';
        var st = cell.getAttribute('data-solarterm');
        document.getElementById('tooltipSolarTerm').innerHTML = st ? '节气：<strong>' + st + '</strong>' : '';
        var hd = cell.getAttribute('data-holiday');
        document.getElementById('tooltipHoliday').innerHTML = hd ? '节假日：<strong>' + hd + '</strong>' : '';
        document.getElementById('tooltipCycle').innerHTML = '周期' + cell.getAttribute('data-cycle') + '：<strong>' + cell.getAttribute('data-cyclestart') + ' - ' + cell.getAttribute('data-cycleend') + '</strong>';

        var rect = cell.getBoundingClientRect();
        tooltip.style.left = (rect.left + rect.width / 2) + 'px';
        tooltip.style.top = (rect.bottom + 8) + 'px';
        tooltip.style.transform = 'translateX(-50%)';
        tooltip.className = 'tooltip show';
      }, 300);
    };

    calendarBody.onmouseout = function(e) {
      var cell = null;
      var target = e.target;
      while (target && target !== calendarBody) {
        if (target.className && target.className.indexOf('date-cell') >= 0) {
          cell = target;
          break;
        }
        target = target.parentNode;
      }
      if (!cell) return;
      clearTimeout(tooltipTimeout);
      tooltip.className = 'tooltip';
    };

    // 键盘快捷键
    document.onkeydown = function(e) {
      if (e.target.tagName === 'INPUT') return;

      switch (e.key) {
        case 'ArrowLeft':
          e.preventDefault();
          document.getElementById('prevMonth').click();
          break;
        case 'ArrowRight':
          e.preventDefault();
          document.getElementById('nextMonth').click();
          break;
        case 'ArrowUp':
          e.preventDefault();
          document.getElementById('prevYear').click();
          break;
        case 'ArrowDown':
          e.preventDefault();
          document.getElementById('nextYear').click();
          break;
        case 't':
        case 'T':
          e.preventDefault();
          document.getElementById('todayBtn').click();
          break;
        case 'd':
        case 'D':
          e.preventDefault();
          darkModeBtn.click();
          break;
        case '/':
          e.preventDefault();
          searchInput.focus();
          break;
      }
    };

    // 错误提示
    function showError(msg) {
      var existing = document.querySelector('.error-msg');
      if (existing) existing.parentNode.removeChild(existing);

      var div = document.createElement('div');
      div.className = 'error-msg';
      div.textContent = msg;
      document.body.appendChild(div);

      setTimeout(function() {
        if (div.parentNode) div.parentNode.removeChild(div);
      }, 3000);
    }

    // 初始化
    render();
  </script>
